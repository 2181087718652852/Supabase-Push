name: Status Page

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/status-page.yml"
      - "status/**"

jobs:
  check:
    name: Run Health Checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: "API"
            url: "https://lightyapp.xyz"
            expect: 200

          - name: "Accounts"
            url: "https://connect.lightyapp.xyz"
            expect: 200

          - name: "Payments"
            url: "https://connect.lightyapp.xyz"
            expect: 200

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Probe ${{ matrix.service.name }}
        id: probe
        run: |
          START=$(date +%s%3N)

          HTTP_CODE=$(curl \
            --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            --max-time 10 \
            --retry 2 \
            --retry-delay 2 \
            "${{ matrix.service.url }}" || echo "000")

          END=$(date +%s%3N)
          LATENCY=$((END - START))

          if [ "$HTTP_CODE" = "${{ matrix.service.expect }}" ]; then
            STATUS="up"
          else
            STATUS="down"
          fi

          echo "status=$STATUS"         >> "$GITHUB_OUTPUT"
          echo "http_code=$HTTP_CODE"   >> "$GITHUB_OUTPUT"
          echo "latency_ms=$LATENCY"    >> "$GITHUB_OUTPUT"

      - name: Save result
        run: |
          mkdir -p results
          SAFE_NAME=$(echo "${{ matrix.service.name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
          cat > "results/${SAFE_NAME}.json" <<EOF
          {
            "name": "${{ matrix.service.name }}",
            "url": "${{ matrix.service.url }}",
            "status": "${{ steps.probe.outputs.status }}",
            "http_code": "${{ steps.probe.outputs.http_code }}",
            "latency_ms": ${{ steps.probe.outputs.latency_ms }},
            "checked_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload check result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.service.name }}
          path: results/
          retention-days: 1

  build:
    name: Build & Publish Status Page
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all check results
        uses: actions/download-artifact@v4
        with:
          path: all-results/
          merge-multiple: true

      - name: Load history
        run: |
          if [ -f status/history.json ]; then
            cp status/history.json history.json
          else
            echo "[]" > history.json
          fi

      - name: Render status page
        run: |
          python3 - <<'PYEOF'
          import json, os, glob
          from datetime import datetime, timezone

          # ── BRANDING ─────────────────────────────────────────
          SITE_TITLE       = "Lighty Status"
          SITE_DESCRIPTION = "Status for Lighty services"
          HOMEPAGE_URL     = "https://lightyapp.xyz"         # Top-right Homepage button link
          LOGO_URL         = "https://iopgokphqerqsnqfkogz.supabase.co/storage/v1/object/public/lighty/images/logo-no-background.png"
          LOGO_HEIGHT_PX   = 48                              # Logo height in pixels

          # ── COLORS ───────────────────────────────────────────
          COLOR_BG              = "#f7f5f0"   # Page background (keep as-is)
          COLOR_TEXT            = "#1a1814"   # Body text
          COLOR_MUTED           = "#6b7280"   # Subtitle / secondary text
          COLOR_BORDER          = "#e5e7eb"   # Table/card borders
          COLOR_UP_BG           = "#f0fdf4"   # Operational section background
          COLOR_UP_HEADER       = "#dcfce7"   # Operational section header background
          COLOR_UP_TEXT         = "#16a34a"   # Operational section header text
          COLOR_DOWN_BG         = "#fff5f5"   # Outage section background
          COLOR_DOWN_HEADER     = "#fee2e2"   # Outage section header background
          COLOR_DOWN_TEXT       = "#dc2626"   # Outage section header text
          COLOR_BTN_BG          = "#2563eb"   # Homepage button background
          COLOR_BTN_TEXT        = "#ffffff"   # Homepage button text
          COLOR_ICON_UP         = "#16a34a"   # ✓ checkmark color
          COLOR_ICON_DOWN       = "#dc2626"   # ✗ cross color
          # ─────────────────────────────────────────────────────

          results = []
          for path in glob.glob("all-results/**/*.json", recursive=True):
              with open(path) as f:
                  results.append(json.load(f))

          results.sort(key=lambda r: r["name"])

          up_services   = [r for r in results if r["status"] == "up"]
          down_services = [r for r in results if r["status"] != "up"]

          def make_row(r):
              if r["status"] == "up":
                  icon = f'<span class="icon icon-up" title="Operational">&#10003;</span>'
              else:
                  icon = f'<span class="icon icon-down" title="Down (HTTP {r[\'http_code\']})">&#10007;</span>'
              return f'<li class="row"><span class="row-name">{r["name"]}</span>{icon}</li>'

          down_rows = "\n".join(make_row(r) for r in down_services)
          up_rows   = "\n".join(make_row(r) for r in up_services)

          outage_section = ""
          if down_services:
              outage_section = f"""
              <div class="section section-down">
                <div class="section-header">Outage</div>
                <ul class="service-list">{down_rows}</ul>
              </div>"""

          operational_section = ""
          if up_services:
              operational_section = f"""
              <div class="section section-up">
                <div class="section-header">Operational</div>
                <ul class="service-list">{up_rows}</ul>
              </div>"""

          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1"/>
            <title>{SITE_TITLE}</title>
            <meta name="description" content="{SITE_DESCRIPTION}"/>
            <link rel="icon" href="{LOGO_URL}"/>
            <style>
              *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}

              body {{
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: {COLOR_BG};
                color: {COLOR_TEXT};
                min-height: 100vh;
                padding: 0;
              }}

              /* ── Top bar ── */
              .topbar {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 1.25rem 2rem;
                border-bottom: 1px solid {COLOR_BORDER};
                background: {COLOR_BG};
              }}
              .topbar-logo {{
                height: {LOGO_HEIGHT_PX}px;
                width: auto;
              }}
              .topbar-title {{
                font-size: 1.5rem;
                font-weight: 700;
                color: {COLOR_TEXT};
              }}
              .btn-home {{
                display: inline-flex;
                align-items: center;
                gap: .4rem;
                background: {COLOR_BTN_BG};
                color: {COLOR_BTN_TEXT};
                text-decoration: none;
                font-size: .875rem;
                font-weight: 500;
                padding: .5rem 1rem;
                border-radius: 6px;
              }}
              .btn-home:hover {{ opacity: .85; }}

              /* ── Main content ── */
              .content {{
                max-width: 960px;
                margin: 2rem auto;
                padding: 0 1.5rem;
              }}

              /* ── Sections ── */
              .section {{
                border: 1px solid {COLOR_BORDER};
                border-radius: 8px;
                overflow: hidden;
                margin-bottom: 1.25rem;
              }}
              .section-header {{
                padding: .65rem 1rem;
                font-size: .9rem;
                font-weight: 600;
              }}
              .section-up .section-header {{
                background: {COLOR_UP_HEADER};
                color: {COLOR_UP_TEXT};
              }}
              .section-down .section-header {{
                background: {COLOR_DOWN_HEADER};
                color: {COLOR_DOWN_TEXT};
              }}
              .section-up {{
                background: {COLOR_UP_BG};
              }}
              .section-down {{
                background: {COLOR_DOWN_BG};
              }}

              /* ── Service rows ── */
              .service-list {{
                list-style: none;
              }}
              .row {{
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: .75rem 1rem;
                border-top: 1px solid {COLOR_BORDER};
                font-size: .9rem;
              }}
              .row-name {{
                color: {COLOR_TEXT};
              }}

              /* ── Icons ── */
              .icon {{
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 28px;
                height: 28px;
                border-radius: 50%;
                font-size: 1rem;
                font-weight: 700;
                flex-shrink: 0;
              }}
              .icon-up {{
                background: {COLOR_ICON_UP};
                color: #fff;
              }}
              .icon-down {{
                background: {COLOR_ICON_DOWN};
                color: #fff;
              }}

              /* ── Footer ── */
              footer {{
                text-align: center;
                color: {COLOR_MUTED};
                font-size: .8rem;
                padding: 2rem 1rem;
                border-top: 1px solid {COLOR_BORDER};
                margin-top: 2rem;
              }}
            </style>
          </head>
          <body>

            <div class="topbar">
              <img class="topbar-logo" src="{LOGO_URL}" alt="{SITE_TITLE} logo"/>
              <a class="btn-home" href="{HOMEPAGE_URL}">&#8962; Homepage</a>
            </div>

            <div class="content">
              {outage_section}
              {operational_section}
            </div>

            <footer>
              Powered by <a href="https://github.com/features/actions" style="color:{COLOR_MUTED}">GitHub Actions</a>
            </footer>

          </body>
          </html>"""

          os.makedirs("public", exist_ok=True)
          with open("public/index.html", "w") as f:
              f.write(html)

          print(f"Rendered — {len(up_services)} up, {len(down_services)} down")
          PYEOF

      - name: Update uptime history
        run: |
          python3 - <<'PYEOF'
          import os, json, glob
          from datetime import datetime, timezone, timedelta

          HISTORY_DAYS = 90

          results = []
          for path in glob.glob("all-results/**/*.json", recursive=True):
              with open(path) as f:
                  results.append(json.load(f))

          with open("history.json") as f:
              history = json.load(f)

          history.append({
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "services": results
          })

          cutoff = datetime.now(timezone.utc) - timedelta(days=HISTORY_DAYS)
          history = [
              e for e in history
              if datetime.fromisoformat(e["timestamp"]) > cutoff
          ]

          os.makedirs("status", exist_ok=True)
          with open("status/history.json", "w") as f:
              json.dump(history, f, indent=2)

          print(f"History updated — {len(history)} entries retained")
          PYEOF

      - name: Commit history
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status/history.json
          git diff --cached --quiet || git commit -m "chore: update status history [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "deploy: status page update"
          force_orphan: false
