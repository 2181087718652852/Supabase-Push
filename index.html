<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Lighty Status</title>
  <meta name="description" content="Status for Lighty services"/>
  <link rel="icon" href="https://iopgokphqerqsnqfkogz.supabase.co/storage/v1/object/public/lighty/images/logo-no-background.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f5f0;
      color: #1a1814;
      min-height: 100vh;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #e5e7eb;
      background: #f7f5f0;
    }
    .topbar-logo { height: 48px; width: auto; }
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: #2563eb;
      color: #ffffff;
      text-decoration: none;
      font-size: .875rem;
      font-weight: 500;
      padding: .5rem 1rem;
      border-radius: 6px;
    }
    .btn-home:hover { opacity: .85; }
    .content {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .section {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1.25rem;
    }
    .section-header {
      padding: .65rem 1rem;
      font-size: .9rem;
      font-weight: 600;
    }
    .section-up { background: #f0fdf4; }
    .section-up .section-header { background: #dcfce7; color: #16a34a; }
    .section-down { background: #fff5f5; }
    .section-down .section-header { background: #fee2e2; color: #dc2626; }
    .service-list { list-style: none; }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .75rem 1rem;
      border-top: 1px solid #e5e7eb;
      font-size: .9rem;
    }
    .row-name { color: #1a1814; }
    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .icon-up   { background: #16a34a; color: #fff; }
    .icon-down { background: #dc2626; color: #fff; }
    footer {
      text-align: center;
      color: #6b7280;
      font-size: .8rem;
      padding: 2rem 1rem;
      border-top: 1px solid #e5e7eb;
      margin-top: 2rem;
    }
    footer a { color: #6b7280; }
  </style>
</head>
<body>
  <div class="topbar">
    <img class="topbar-logo" src="https://iopgokphqerqsnqfkogz.supabase.co/storage/v1/object/public/lighty/images/logo-no-background.png" alt="Lighty Status logo"/>
    <a class="btn-home" href="https://lightyapp.xyz">&#8962; Homepage</a>
  </div>
  <div class="content">
    <div class="section section-down">
      <div class="section-header">Outage</div>
      <ul class="service-list"><li class="row"><span class="row-name">API</span><span class="icon icon-down" title="HTTP 000000">&#10007;</span></li>
<li class="row"><span class="row-name">Accounts</span><span class="icon icon-down" title="HTTP 403">&#10007;</span></li>
<li class="row"><span class="row-name">Payments</span><span class="icon icon-down" title="HTTP 403">&#10007;</span></li></ul>
    </div>
  </div>
</body>
</html>
